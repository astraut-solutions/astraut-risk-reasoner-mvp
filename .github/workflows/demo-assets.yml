name: Update Demo Assets

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-demo:
    if: "!contains(github.event.head_commit.message, '[skip demo]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Install asciinema and agg
        run: |
          sudo apt-get update
          sudo apt-get install -y asciinema cargo
          cargo install --locked --git https://github.com/asciinema/agg
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Generate demo assets
        run: bash ./scripts/generate_demo_assets.sh

      - name: Commit updated demo assets
        run: |
          if [[ -n "$(git status --porcelain docs/demo)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/demo
            git commit -m "chore(demo): refresh generated demo assets [skip demo]"
            git push
          else
            echo "No demo asset changes detected."
          fi
